# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# For window rules and layerrules
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# This file is used to add or overwrite window rules 
# This file will not be modified during dotfiles updates

# Android Studio flicker workaround on Hyprland:
# helper popup windows titled "win..." can repeatedly steal focus.
# Android Studio can expose either class name below depending on build/launch method.
windowrule = no_initial_focus on, match:class ^(android-studio|jetbrains-studio)$, match:title ^win(.*)$
windowrule = no_focus on, match:class ^(android-studio|jetbrains-studio)$, match:title ^win(.*)$
